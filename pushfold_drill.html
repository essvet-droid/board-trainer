<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Push/Fold Drill — GTO Nash (HRC)</title>
<style>
  :root{
    --bg:#0e1116; --panel:#171c24; --panel2:#1e252f; --line:#2a323d;
    --txt:#e6ebf1; --dim:#9aa7b5; --accent:#4da3ff; --accent2:#2b6cb0;
    --good:#39d98a; --good-bg:#123a2a; --bad:#ff5c6c; --bad-bg:#3a1620;
    --warn:#ffbe4d; --warn-bg:#3a2e12; --chip:#232b36;
    --red:#ff6b7a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px; line-height:1.4;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{max-width:560px; margin:0 auto; padding:14px 14px 60px}
  h1{font-size:18px; margin:0 0 2px; font-weight:700; letter-spacing:.2px}
  .sub{color:var(--dim); font-size:12px; margin-bottom:12px}

  /* Mode switch */
  .modes{display:flex; gap:6px; margin-bottom:12px}
  .modes button{flex:1; background:var(--panel); color:var(--dim); border:1px solid var(--line);
                border-radius:10px; padding:9px; font-size:14px; font-weight:800; cursor:pointer}
  .modes button.on{background:var(--accent2); color:#fff; border-color:var(--accent)}
  .exsel{width:100%; margin-top:8px; background:var(--panel2); color:var(--txt); border:1px solid var(--line);
         border-radius:10px; padding:11px 12px; font-size:15px; font-weight:600}
  .ex-hint{color:var(--dim); font-size:12px; text-align:center; margin:10px 0 4px}

  /* Filters */
  .filters{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px}
  .fgroup{display:flex; gap:4px; align-items:center; background:var(--panel); border:1px solid var(--line);
          border-radius:9px; padding:4px 6px}
  .fgroup label{font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; margin-right:2px}
  .seg{display:flex; gap:2px}
  .seg button{background:var(--chip); color:var(--dim); border:1px solid transparent; border-radius:6px;
              padding:4px 8px; font-size:12px; cursor:pointer; font-weight:600}
  .seg button.on{background:var(--accent2); color:#fff; border-color:var(--accent)}

  /* Spot card */
  .spot{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px}
  .spot-head{display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px}
  .badges{display:flex; gap:6px; flex-wrap:wrap}
  .badge{background:var(--chip); color:var(--txt); border-radius:20px; padding:3px 10px; font-size:12px; font-weight:700}
  .badge.pos{background:var(--accent2); color:#fff}
  .context{font-size:13px; color:var(--dim); margin-bottom:12px}
  .context b{color:var(--txt)}

  /* Cards (SVG 4-couleurs, identique board_trainer/feeling_equite) */
  .hand{display:flex; gap:10px; justify-content:center; margin:6px 0 10px}
  .card-wrapper{display:inline-block; border-radius:9px; line-height:0; box-shadow:0 2px 6px rgba(0,0,0,.45)}
  .card-wrapper svg{display:block}
  .hand-label{text-align:center; font-size:13px; color:var(--dim); margin-top:0; margin-bottom:12px}

  /* Action buttons */
  .actions{display:flex; flex-direction:column; gap:8px}
  .act{display:flex; justify-content:space-between; align-items:center; background:var(--panel2);
       border:1px solid var(--line); border-radius:11px; padding:13px 15px; cursor:pointer;
       font-size:16px; font-weight:700; transition:transform .05s}
  .act:active{transform:scale(.985)}
  .act .amt{font-size:12px; color:var(--dim); font-weight:600}
  .act.chosen{border-color:var(--accent)}
  .act.reveal-best{border-color:var(--good); background:var(--good-bg)}
  .act.reveal-chosen-bad{border-color:var(--bad); background:var(--bad-bg)}
  .act.disabled{opacity:.9; cursor:default}
  .act .rhs{display:flex; align-items:center; gap:10px}
  .act .freq{font-size:12px; color:var(--dim); min-width:44px; text-align:right}
  .act .ev{font-size:13px; font-weight:800; min-width:62px; text-align:right}
  .ev.pos{color:var(--good)} .ev.neg{color:var(--red)} .ev.zero{color:var(--dim)}
  .tag{font-size:10px; font-weight:800; padding:2px 6px; border-radius:5px; margin-left:6px}
  .tag.best{background:var(--good); color:#062}
  .tag.you{background:var(--accent); color:#022}

  /* Verdict */
  .verdict{margin-top:12px; border-radius:11px; padding:12px 14px; font-size:14px; font-weight:600}
  .verdict.ok{background:var(--good-bg); border:1px solid var(--good); color:var(--good)}
  .verdict.mid{background:var(--warn-bg); border:1px solid var(--warn); color:var(--warn)}
  .verdict.ko{background:var(--bad-bg); border:1px solid var(--bad); color:var(--bad)}
  .verdict .expl{color:var(--txt); font-weight:400; margin-top:5px; font-size:13px}

  .next{margin-top:12px; width:100%; background:var(--accent2); color:#fff; border:1px solid var(--accent);
        border-radius:11px; padding:14px; font-size:16px; font-weight:800; cursor:pointer}
  .next:active{transform:scale(.99)}

  /* Grille 13x13 (stratégie GTO du spot) */
  .grid-title{font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; margin:14px 0 7px}
  .grid{display:grid; grid-template-columns:repeat(13,1fr); gap:2px}
  .gcell{position:relative; aspect-ratio:1/1; border-radius:3px; font-size:9px; font-weight:700;
         color:#fff; display:flex; align-items:center; justify-content:center; overflow:hidden;
         text-shadow:0 1px 1px rgba(0,0,0,.6)}
  .gcell span{position:relative; z-index:1}
  .gcell.out{background:#1b2027 !important; color:#454e59}
  .gcell.clickable{cursor:pointer}
  .gcell.clickable:active{filter:brightness(1.25)}
  .gcell.hero{outline:2.5px solid #fff; outline-offset:-2px; z-index:2; border-radius:3px}
  .glegend{display:flex; flex-wrap:wrap; gap:8px 12px; margin-top:8px; font-size:11px; color:var(--dim)}
  .glegend span{display:inline-flex; align-items:center; gap:4px}
  .glegend i{width:11px; height:11px; border-radius:3px; display:inline-block}

  /* Dashboard */
  .dash{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:6px}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:9px 6px; text-align:center}
  .stat .v{font-size:19px; font-weight:800}
  .stat .k{font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.4px; margin-top:1px}
  .stat .v.good{color:var(--good)} .stat .v.bad{color:var(--red)}
  .foot{color:var(--dim); font-size:11px; text-align:center; margin-top:14px; line-height:1.5}
  .reset{background:none; border:none; color:var(--dim); font-size:11px; cursor:pointer; text-decoration:underline; padding:2px 4px}
  .reset:active{color:var(--txt)}
  .toggle{background:var(--chip); border:1px solid var(--line); color:var(--dim); font-size:11px; font-weight:700;
          cursor:pointer; border-radius:7px; padding:5px 9px}
  .toggle.on{background:var(--good-bg); border-color:var(--good); color:var(--good)}
  .toprow{display:flex; justify-content:space-between; align-items:center; gap:8px; margin:-2px 0 8px}
  .empty{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:20px; text-align:center; color:var(--dim)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Push/Fold Drill <span style="color:var(--accent)">GTO</span></h1>
  <div class="sub">Nash HRC — EV & fréquences exactes · HU + 3-max · 10 / 15 / 25 bb</div>

  <div class="modes" id="modes">
    <button data-m="drill" class="on">🎯 Drill</button>
    <button data-m="explore">📊 Explorer</button>
  </div>

  <div id="drillChrome">
    <div class="dash">
      <div class="stat"><div class="v" id="s-hands">0</div><div class="k">Mains</div></div>
      <div class="stat"><div class="v good" id="s-acc">—</div><div class="k">Précision</div></div>
      <div class="stat"><div class="v" id="s-streak">0</div><div class="k">Série</div></div>
      <div class="stat"><div class="v" id="s-ev">0.00</div><div class="k">EV cédé/main</div></div>
    </div>
    <div class="filters" id="filters"></div>
    <div class="toprow">
      <button class="toggle" id="weakBtn">🎯 Cibler mes points faibles</button>
      <button class="reset" id="resetBtn">↺ Réinitialiser</button>
    </div>
  </div>

  <div id="exploreChrome" style="display:none">
    <div class="filters" id="exFilters"></div>
    <select id="exSpotSel" class="exsel"></select>
  </div>

  <div id="board"></div>

  <div class="foot" id="foot"></div>
</div>

  var SUIT_SYMBOL = { h:'♥', d:'♦', c:'♣', s:'♠' };
  var CARD_COLORS = { h:'#C0392B', d:'#1A6FA8', c:'#1E8449', s:'#1a1a1a' };
  function cardSvg(code){
    var rank = code[0]==='T' ? '10' : code[0].toUpperCase();
    var suit = code[1].toLowerCase();
    var color = CARD_COLORS[suit]||'#333', sym = SUIT_SYMBOL[suit]||'?';
    var w=60,h=84,rRank=32,rSym=48,rx=7,rankY=26,symY=76;

      '<text x="'+(w/2)+'" y="'+symY+'" text-anchor="middle" dominant-baseline="auto" style="font-family:Arial,sans-serif;font-weight:700;font-size:'+rSym+'px;fill:rgba(255,255,255,0.30)">'+sym+'</text></svg>';
  }
  function cardHTML(code){ return '<div class="card-wrapper">'+cardSvg(code)+'</div>'; }

  function handCombos(h){
    if(h.length===2) return 6;          // paire (ex AA)
    return h[2]==='s' ? 4 : 12;         // suited / offsuit
  }
  // Codes cartes (rang+couleur) representatifs d'une classe de main
  function handCards(h){
    var r1=h[0], r2=h[1];

    if(h[2]==='s')  return [r1+'s', r2+'s'];          // suited : deux piques

  }

  var filt = {format:'ALL', depth:'ALL', pos:'ALL'};
  function eligible(){

  // ---- Stats (persistées) ----

        if(stat.best==null) stat.best = stat.streak||0;

  }
  function resetState(){
    stat = {hands:0, correct:0, streak:0, best:0, evLost:0};

    saveState();
    newQuestion();
  }

  // ---- Current question ----
  var cur = null; // {spot, hand, answered, chosenIdx}
  var targetWeak = true; // répétition espacée : cibler les points faibles

  // Poids d'un spot pour la répétition espacée : 1 (maîtrisé) .. 5 (raté), 2.5 (jamais vu)
  function spotWeight(s){
    var ss = spotStats[s.spot_id];
    if(!ss || ss.n===0) return 2.5;
    var acc = ss.ok/ss.n;
    var w = 1 + 4*(1-acc);
    if(ss.n<3) w += 0.5; // petit échantillon : garder de la présence
    return w;
  }
  function pickSpot(pool){
    if(!targetWeak || pool.length===1) return pool[(Math.random()*pool.length)|0];
    var tot=0, w=[];
    for(var i=0;i<pool.length;i++){ var x=spotWeight(pool[i]); w.push(x); tot+=x; }
    var r=Math.random()*tot;
    for(var j=0;j<pool.length;j++){ r-=w[j]; if(r<=0) return pool[j]; }
    return pool[pool.length-1];
  }

  function weightedHand(spot){
    // tire une main pondérée par le nb de combos × weight (réalisme)
    var keys = Object.keys(spot.hands);
    var tot=0, w=[];
    for(var i=0;i<keys.length;i++){
      var d=spot.hands[keys[i]];
      var ww=(d.w!=null?d.w:1)*handCombos(keys[i]);
      w.push(ww); tot+=ww;
    }
    var r=Math.random()*tot;
    for(var j=0;j<keys.length;j++){ r-=w[j]; if(r<=0) return keys[j]; }
    return keys[keys.length-1];
  }

  function newQuestion(){
    var pool = eligible();
    if(pool.length===0){ cur=null; render(); return; }
    var spot = pickSpot(pool);
    var hand = weightedHand(spot);
    cur = {spot:spot, hand:hand, answered:false, chosenIdx:null};
    render();
  }

  function bestIdx(evs){
    var bi=0; for(var i=1;i<evs.length;i++){ if(evs[i]>evs[bi]) bi=i; } return bi;
  }

  function answer(idx){
    if(!cur || cur.answered) return;
    cur.answered=true; cur.chosenIdx=idx;
    var d = cur.spot.hands[cur.hand];
    var bi = bestIdx(d.ev);
    var loss = d.ev[bi]-d.ev[idx];
    var ok = loss<=EPS;
    stat.hands++;
    if(ok){ stat.correct++; stat.streak++; if(stat.streak>stat.best) stat.best=stat.streak; }
    else { stat.streak=0; }
    stat.evLost += Math.max(0,loss);
    // stats par spot (socle répétition espacée)
    var id = cur.spot.spot_id;
    var ss = spotStats[id] || (spotStats[id]={n:0, ok:0, evLost:0});
    ss.n++; if(ok) ss.ok++; ss.evLost += Math.max(0,loss);
    saveState();
    render();
  }

  // ---- Rendering ----
  function fmtEv(x){
    var s=(x>=0?'+':'')+x.toFixed(2);
    return s;
  }
  function evClass(x){ return x>0.005?'pos':(x<-0.005?'neg':'zero'); }

  function cellGradient(spot, d){
    var acc=0, stops=[];
    for(var i=0;i<spot.actions.length;i++){
      var f=d.p[i]*100; if(f<=0.05) continue;
      var col=ROLE_COLORS[spot.actions[i].role]||'#777';
      stops.push(col+' '+acc.toFixed(1)+'%');
      acc+=f;
      stops.push(col+' '+acc.toFixed(1)+'%');
    }
    if(!stops.length) return '#2a2a2a';
    return 'linear-gradient(90deg,'+stops.join(',')+')';
  }

  function renderGrid(spot, highlightHand, clickable){
    var cells='', anyOut=false;
    for(var i=0;i<13;i++){
      for(var j=0;j<13;j++){
        var name;
        if(i===j) name=RANKS[i]+RANKS[i];
        else if(i<j) name=RANKS[i]+RANKS[j]+'s';
        else name=RANKS[j]+RANKS[i]+'o';
        var d=spot.hands[name];
        var hero = (name===highlightHand) ? ' hero' : '';
        var dh = clickable ? ' data-hand="'+name+'"' : '';
        var cl = clickable ? ' clickable' : '';
        var txt = name.substring(0,2);
        if(d){
          cells+='<div class="gcell'+hero+cl+'"'+dh+' style="background:'+cellGradient(spot,d)+'"><span>'+txt+'</span></div>';
        } else {
          anyOut=true;
          cells+='<div class="gcell out'+hero+cl+'"'+dh+'><span>'+txt+'</span></div>';
        }
      }
    }
    // légende : rôles présents dans les actions du spot (+ hors range)
    var seen={}, leg='';
    for(var k=0;k<spot.actions.length;k++){
      var r=spot.actions[k].role;
      if(seen[r]) continue; seen[r]=1;
      leg+='<span><i style="background:'+(ROLE_COLORS[r]||'#777')+'"></i>'+(ROLE_LABEL[r]||r)+'</span>';
    }
    if(anyOut) leg+='<span><i style="background:#1b2027"></i>Hors range</span>';
    return '<div class="grid-title">Stratégie GTO du spot</div>'+
           '<div class="grid">'+cells+'</div>'+
           '<div class="glegend">'+leg+'</div>';
  }

  function render(){
    renderFilters();
    renderDash();
    var board=document.getElementById('board');
    if(!cur){
      board.innerHTML='<div class="empty">Aucun spot pour ces filtres.<br>Élargis la sélection.</div>';
      document.getElementById('foot').textContent='';
      return;
    }
    var s=cur.spot, d=s.hands[cur.hand];
    var bi = cur.answered ? bestIdx(d.ev) : -1;

    var cards = handCards(cur.hand).map(cardHTML).join('');

    var html='<div class="spot">';
    html+='<div class="spot-head"><div class="badges">'+
          '<span class="badge pos">'+s.hero_pos+'</span>'+
          '<span class="badge">'+s.depth_bb+' bb</span>'+
          '<span class="badge">'+s.format+'</span>'+
          '</div></div>';
    html+='<div class="context">'+escapeHtml(s.context)+'</div>';
    html+='<div class="hand">'+cards+'</div>';
    html+='<div class="hand-label">'+cur.hand+'</div>';

    html+='<div class="actions">';
    for(var i=0;i<s.actions.length;i++){
      var a=s.actions[i];
      var cls='act';
      var rhs='';
      if(cur.answered){
        cls+=' disabled';
        if(i===bi) cls+=' reveal-best';
        if(i===cur.chosenIdx && i!==bi) cls+=' reveal-chosen-bad';
        var freq=(d.p[i]*100);
        var freqTxt = freq<0.05 ? '0%' : (freq>99.95?'100%':freq.toFixed(0)+'%');
        var evv=d.ev[i];
        rhs='<span class="rhs">'+
              '<span class="freq">'+freqTxt+'</span>'+
              '<span class="ev '+evClass(evv)+'">'+fmtEv(evv)+' bb</span>'+
            '</span>';
      }
      var tags='';
      if(cur.answered){
        if(i===bi) tags+='<span class="tag best">GTO</span>';
        if(i===cur.chosenIdx) tags+='<span class="tag you">TOI</span>';
      }
      var label = (a.curated || a.label);
      var amt = (a.type==='R'||a.type==='C') && a.amount_bb>0 ? '<div class="amt">'+a.label+'</div>' : '';
      html+='<div class="'+cls+'" data-idx="'+i+'">'+
              '<span><span>'+escapeHtml(label)+'</span>'+tags+amt+'</span>'+
              rhs+
            '</div>';
    }
    html+='</div>';

    if(cur.answered){
      var loss=d.ev[bi]-d.ev[cur.chosenIdx];
      var vcls, vtxt;
      if(loss<=EPS){ vcls='ok'; vtxt='✅ Correct'; }
      else if(loss<=0.5){ vcls='mid'; vtxt='🟠 Marginal — tu cèdes '+loss.toFixed(2)+' bb'; }
      else { vcls='ko'; vtxt='❌ Erreur — tu cèdes '+loss.toFixed(2)+' bb'; }
      var bestLabel = s.actions[bi].curated || s.actions[bi].label;
      var mixNote = mixDescription(s,d);
      html+='<div class="verdict '+vcls+'">'+vtxt+
            '<div class="expl">GTO : <b>'+escapeHtml(bestLabel)+'</b> ('+fmtEv(d.ev[bi])+' bb). '+mixNote+'</div></div>';
      html+=renderGrid(s, cur.hand);
      html+='<button class="next" id="nextBtn">Main suivante →</button>';
    }

    html+='</div>';
    board.innerHTML=html;

    if(cur.answered){
      document.getElementById('nextBtn').onclick=newQuestion;
    } else {
      var nodes=board.querySelectorAll('.act');
      for(var k=0;k<nodes.length;k++){
        (function(el){ el.onclick=function(){ answer(+el.getAttribute('data-idx')); }; })(nodes[k]);
      }
    }
    document.getElementById('foot').innerHTML =
      'Source : HRC Nash · EV en bb (référence = fold) · '+SPOTS.length+' spots chargés';
  }

  function mixDescription(s,d){
    // Décrit la stratégie mixte GTO de la main sur ce spot.
    var parts=[];
    for(var i=0;i<d.p.length;i++){
      if(d.p[i]>=0.005){
        var lbl=s.actions[i].curated||s.actions[i].label;
        parts.push(Math.round(d.p[i]*100)+'% '+lbl.toLowerCase());
      }
    }
    if(parts.length<=1) return '';
    return 'Mix : '+parts.join(' / ')+'.';
  }

  function renderDash(){
    document.getElementById('s-hands').textContent=stat.hands;
    var acc = stat.hands? Math.round(stat.correct/stat.hands*100)+'%' : '—';
    var accEl=document.getElementById('s-acc');
    accEl.textContent=acc;
    accEl.className='v '+(stat.hands? (stat.correct/stat.hands>=0.8?'good':(stat.correct/stat.hands>=0.6?'':'bad')) : 'good');
    document.getElementById('s-streak').textContent=stat.streak;
    var sk=document.getElementById('s-streak').parentNode.querySelector('.k');
    if(sk) sk.textContent = stat.best ? ('Série · rec '+stat.best) : 'Série';
    var avg = stat.hands? (stat.evLost/stat.hands) : 0;
    var evEl=document.getElementById('s-ev');
    evEl.textContent='-'+avg.toFixed(2);
    evEl.className='v '+(avg<=0.05?'good':(avg<=0.2?'':'bad'));
  }

  function renderFilters(){
    var el=document.getElementById('filters');
    if(el.dataset.built) return;
    el.dataset.built='1';
    function group(label,key,opts){
      var h='<div class="fgroup"><label>'+label+'</label><div class="seg">';
      for(var i=0;i<opts.length;i++){
        h+='<button data-k="'+key+'" data-v="'+opts[i][1]+'">'+opts[i][0]+'</button>';
      }
      return h+'</div></div>';
    }
    el.innerHTML =
      group('Table','format',[['Tout','ALL'],['HU','HU'],['3-max','3MAX']])+
      group('Stack','depth',[['Tout','ALL'],['10','10'],['15','15'],['25','25']])+
      group('Place','pos',[['Tout','ALL'],['BTN','BN'],['SB','SB'],['BB','BB']]);
    var btns=el.querySelectorAll('button');
    for(var i=0;i<btns.length;i++){
      (function(b){
        b.onclick=function(){
          var k=b.getAttribute('data-k'), v=b.getAttribute('data-v');
          filt[k]=v;
          // maj visuel
          var sibs=b.parentNode.querySelectorAll('button');
          for(var j=0;j<sibs.length;j++) sibs[j].classList.remove('on');
          b.classList.add('on');
          saveState();
          newQuestion();
        };
      })(btns[i]);
    }
    // état initial "on" (reflète les filtres sauvegardés)
    for(var m=0;m<btns.length;m++){
      var kk=btns[m].getAttribute('data-k'), vv=btns[m].getAttribute('data-v');
      if(filt[kk]===vv) btns[m].classList.add('on');
    }
  }

  function escapeHtml(s){
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- Mode Explorer (chart browser) ----
  var mode = 'drill';
  var ex = {format:'HU', depth:'15', spotId:null, hand:null};

  function exPool(){
    return SPOTS.filter(function(s){ return s.format===ex.format && s.depth_bb===+ex.depth; });
  }
  function exCurrentSpot(){
    var pool=exPool();
    if(!pool.length) return null;
    var s=pool.filter(function(x){return x.spot_id===ex.spotId;})[0];
    return s||pool[0];
  }
  function exGroup(label,key,opts){
    var h='<div class="fgroup"><label>'+label+'</label><div class="seg">';
    for(var i=0;i<opts.length;i++){
      var on = ex[key]===opts[i][1] ? ' class="on"' : '';
      h+='<button data-k="'+key+'" data-v="'+opts[i][1]+'"'+on+'>'+opts[i][0]+'</button>';
    }
    return h+'</div></div>';
  }
  function renderExFilters(){
    var el=document.getElementById('exFilters');
    el.innerHTML = exGroup('Table','format',[['HU','HU'],['3-max','3MAX']])+
                   exGroup('Stack','depth',[['10','10'],['15','15'],['25','25']]);
    var btns=el.querySelectorAll('button');
    for(var i=0;i<btns.length;i++){(function(b){
      b.onclick=function(){ ex[b.getAttribute('data-k')]=b.getAttribute('data-v'); ex.spotId=null; ex.hand=null; renderExplore(); };
    })(btns[i]);}
  }
  function renderExSpotSel(){
    var sel=document.getElementById('exSpotSel');
    var pool=exPool(), cur=exCurrentSpot(), opts='';
    for(var i=0;i<pool.length;i++){
      var s=pool[i], selAttr=(cur && s.spot_id===cur.spot_id)?' selected':'';
      opts+='<option value="'+s.spot_id+'"'+selAttr+'>'+s.hero_pos+' · '+escapeHtml(s.context)+'</option>';
    }
    sel.innerHTML=opts;
    sel.onchange=function(){ ex.spotId=sel.value; ex.hand=null; renderExplore(); };
  }
  function exBreakdown(spot, hand){
    var d=spot.hands[hand], bi=bestIdx(d.ev);
    var cards=handCards(hand).map(cardHTML).join('');
    var rows='<div class="actions">';
    for(var i=0;i<spot.actions.length;i++){
      var a=spot.actions[i], freq=d.p[i]*100;
      var freqTxt=freq<0.05?'0%':(freq>99.95?'100%':freq.toFixed(0)+'%');
      var evv=d.ev[i], cls='act disabled'+(i===bi?' reveal-best':'');
      var tag=i===bi?'<span class="tag best">GTO</span>':'';
      rows+='<div class="'+cls+'"><span>'+escapeHtml(a.curated||a.label)+tag+'</span>'+
            '<span class="rhs"><span class="freq">'+freqTxt+'</span>'+
            '<span class="ev '+evClass(evv)+'">'+fmtEv(evv)+' bb</span></span></div>';
    }
    rows+='</div>';
    return '<div class="hand" style="margin-top:12px">'+cards+'</div>'+
           '<div class="hand-label">'+hand+'</div>'+rows;
  }
  function renderExplore(){
    renderExFilters();
    renderExSpotSel();
    var spot=exCurrentSpot(), board=document.getElementById('board');
    if(!spot){ board.innerHTML='<div class="empty">Aucun spot.</div>'; return; }
    ex.spotId=spot.spot_id;
    var html='<div class="spot"><div class="spot-head"><div class="badges">'+
      '<span class="badge pos">'+spot.hero_pos+'</span>'+
      '<span class="badge">'+spot.depth_bb+' bb</span>'+
      '<span class="badge">'+spot.format+'</span></div></div>'+
      '<div class="context">'+escapeHtml(spot.context)+'</div>'+
      renderGrid(spot, ex.hand, true)+
      '<div class="ex-hint">Clique une case pour l\'EV et les fréquences de la main</div>';
    if(ex.hand && spot.hands[ex.hand]) html+=exBreakdown(spot, ex.hand);
    html+='</div>';
    board.innerHTML=html;
    var cells=board.querySelectorAll('.gcell.clickable');
    for(var k=0;k<cells.length;k++){(function(c){
      c.onclick=function(){ var hn=c.getAttribute('data-hand'); if(spot.hands[hn]){ ex.hand=hn; renderExplore(); } };
    })(cells[k]);}
    document.getElementById('foot').innerHTML='Source : HRC Nash · EV en bb (référence = fold)';
  }
  function setMode(m){
    mode=m;
    document.getElementById('drillChrome').style.display = m==='drill'?'':'none';
    document.getElementById('exploreChrome').style.display = m==='explore'?'':'none';
    var btns=document.querySelectorAll('#modes button');
    for(var i=0;i<btns.length;i++) btns[i].classList.toggle('on', btns[i].getAttribute('data-m')===m);
    if(m==='drill'){ if(cur) render(); else newQuestion(); }
    else renderExplore();
  }

  // ---- Boot ----
  loadState();
  var weakBtn=document.getElementById('weakBtn');
  function syncWeakBtn(){ weakBtn.classList.toggle('on', targetWeak); }
  weakBtn.onclick=function(){ targetWeak=!targetWeak; syncWeakBtn(); saveState(); };
  syncWeakBtn();
  document.getElementById('resetBtn').onclick=function(){
    if(!stat.hands || confirm('Réinitialiser toutes les stats ?')) resetState();
  };
  var modeBtns=document.querySelectorAll('#modes button');
  for(var mb=0;mb<modeBtns.length;mb++){(function(b){
    b.onclick=function(){ setMode(b.getAttribute('data-m')); };
  })(modeBtns[mb]);}
  newQuestion();
})();
</script>
